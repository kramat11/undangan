<!DOCTYPE html>
<html lang="id">
<head>
    <title>Generator Link Undangan</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f4f4f4; }
        textarea { width: 100%; height: 200px; padding: 10px; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; font-size: 18px; }
        button { padding: 10px 20px; background: #25D366; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #128C7E; }
        #result { margin-top: 20px; white-space: pre-wrap; word-break: break-all; background: white; padding: 20px; border: 1px solid #ddd; display: none; }
        .copy-btn { background: #007bff; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Alat Generator Link Undangan</h2>
    <p>Paste daftar nama tamu di bawah ini (Satu nama per baris):</p>
    
    <textarea id="nameList" placeholder="Reyna Santa&#10;Dewi Kartika&#10;Siska Rika"></textarea>
    
    <p>Masukkan Link Dasar Undangan:</p>
    <input type="text" id="baseUrl" placeholder="https://websiteanda.com/undangan/andi-siti/index.html">
    
    <button onclick="generateLinks()">Buat Link</button>
    
    <div id="result"></div>
    <button id="copyBtn" class="copy-btn" onclick="copyResult()" style="display:none;">Salin Semua Link</button>

    <script>
        function generateLinks() {
            const names = document.getElementById('nameList').value.trim().split('\n');
            let baseUrl = document.getElementById('baseUrl').value.trim();
            const resultDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            
            if(baseUrl === '') { alert('Isi link dasar dulu!'); return; }
            if(!baseUrl.endsWith('.html')) { baseUrl += '/index.html'; } // Tambah index.html jika lupa

            let output = '';
            
            names.forEach((name, index) => {
                if(name.trim() !== '') {
                    // Bersihkan spasi berlebih dan encode URL (spasi jadi %20)
                    const cleanName = name.trim();
                    const encodedName = encodeURIComponent(cleanName);
                    const link = `${baseUrl}?to=${encodedName}`;
                    
                    output += `${index + 1}. ${cleanName}\n${link}\n\n`;
                }
            });

            resultDiv.innerText = output;
            resultDiv.style.display = 'block';
            copyBtn.style.display = 'inline-block';
        }

        function copyResult() {
            const resultText = document.getElementById('result').innerText;
            navigator.clipboard.writeText(resultText).then(() => {
                alert('Semua link berhasil disalin!');
            });
        }
    </script>
</body>
</html>
